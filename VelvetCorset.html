<html lang="en">
<head>

    <link rel="stylesheet" href="VelvetCorset.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<html>
    <head>
    </head>
    <body>
<nav class="navbar">
    <div class="navbar-container">
        <a href="" class="navbar-logo">IRIS</a>
        <button class="navbar-toggle">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
         </button>
         <ul class="navbar-menu">
            <li><a href="index3.html">Home</a></li>
            <li><a href="index2.html">Shop</a></li>
            <li><a href="index4.html">News</a></li>
            <li><a href="index5.html">About</a></li>
         </ul>
    </div>
</nav>

<section class="main-wrap">
<div class="product">
    <div class="image-gallery">
         <img src="Velvetcorset-removebg-preview.png" id="productimg" alt="">
         <div class="controls">
        
         </div>
    </div>
    <div class="product-details">
        <div class="details">
            <h2>Velvet Corset</h2>
            <h3>$30-$50</h3>
            <h4>%35 OFF</h4>
            <p>So Stunning it doesnt even need to have a variant.</p>
        </div> 
        <div class="sizes">
            <form class="form">
            <div class="select-size">
                <h3>Size:</h3>
                <label for="sm">
                    <input type="radio" name="size" id="sm">
                    <span>S</span>
                    </label>

                    <label for="m">
                    <input type="radio" name="size" id="m">
                    <span>M</span>
                    </label>

                    <label for="lg">
                    <input type="radio" name="size" id="lg">
                    <span>L</span>
                    </label>

                    <label for="xl">
                    <input type="radio" name="size" id="xl">
                    <span>XL</span>
                    </label>

                    <label for="xxl">
                    <input type="radio" name="size" id="xxl">
                    <span>XXL</span>
                    </label>
                   </div>
                  </form>
                 </div>

<div class="quantity">
    <div class="select-quantity">
        <h3>Quantity:</h3> 
        <input type="number" name="quantity" value="1">
    </div>
</div>
<div class="sub-btn">
    
    <button class="submit" onclick="openPopup()">Purchase</button>
<div id="myPopup" class="popup">
  <div class="popup-content">
    <h2>Purchase successful</h2>
    <p>Your purchase is now processing<br>Happy Shopping</p>
    <a href="index2.html">
    <button class="Close" onclick="closePopup()">Close</button>
    </a>
  </div>
</div>


</div>
    </div>
</div>

</body>
